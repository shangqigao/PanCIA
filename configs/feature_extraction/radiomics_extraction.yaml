# Define parameters of radiomics
DATASET: CPTAC
RADIOLOGY: "/home/sg2162/rds/hpc-work/Experiments/clinical/CPTAC_included_subjects.json"
DATA_FORMAT: "nifti"
LABEL_DIR: "/home/sg2162/rds/rds-ge-sow2-imaging-MRNJucHuBik/PanCancer/CPTAC_Seg"
SAVE_DIR: "/home/sg2162/rds/rds-ge-sow2-imaging-MRNJucHuBik/PanCancer/Experiments/radiomics"
N_JOBS: 32

# Define parameters of radiomics
RADIOMICS:
  TARGET: "tumor" # "tumor", "organ" or "slice"
  DILATION_MM: 10 # 10 for tumor else 0 for mask dilation
  SAMPLING_RATE: 1 # set 0.01 for whole slice radiomics to reduce feature size, 1 for tumor radiomics
  SEGMENTATOR:
    VALUE: "BiomedParse"
    CHOICES: ["expert", "nnUNet", "BiomedParse"]
    OBJECT: "tumor" # or "tumor" or "organ"
  MODE:
    VALUE: "BiomedParse"
    CHOICES:
      ["pyradiomics", "SegVol", "BiomedParse", "BayesBP", "LVMMed", "FMCIB"]
    SUFFIX:
      - "radiomics.npy"
    # SUFFIX:
    #   - "layer0_radiomics.npy"
    #   - "layer1_radiomics.npy"
    #   - "layer2_radiomics.npy"
    #   - "layer3_radiomics.npy"
    #   - "layer4_radiomics.npy"
  LAYER_METHOD:
    VALUE: null
    CHOICES: [null, "shells", "peeling"]
  TASKS:
    EXTRACTION: False
    CLUSTERING: False
    GRAPH_CONSTRUCTION:
      VALUE: True
      FEATURE_DIS_WEIGHT: 0.01 # 0.01 for LVMMed else 0.1 due to different feature scales, used for clustering in graph construction
      SAVE_CLUSTER_POINTS: False # only true for visualization purpose, default false to reduce json file size
    GRAPH_AGGREGATION:
      VALUE: False
      MODE: "mean"
    CONVERT_JSON2NPZ: False
    MEASURE_GRAPH_PROPERTIES: False
    VISUALIZE_RADIOMICS: False
    VISUALIZE_GRAPH: False
  BATCH_SIZE: 256
  RESOLUTION: 1 # for resampling radiology before feature extraction 
  UNITS: "mm"
  SKIP_EXITS: False
  DELETE_NPY: False # if true, delete npy after graph construction
  DELETE_JSON: False # if true, delete json after convert json to npz
